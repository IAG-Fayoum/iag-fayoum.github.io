<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f766e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <title>بوابة الإدارة الصحية | IAG System</title>
    <link rel="icon" type="image/png" href="assets/icons/favicon.png">

    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Design System (single entrypoint) -->
    <link rel="stylesheet" href="assets/css/system/iag-design-system.css">
    <!-- Page-specific styles -->
    <link rel="stylesheet" href="assets/css/portal.css">
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div class="login-screen" id="login-screen" style="display:none">
        <div class="login-card">
            <div class="login-logo">
                <i data-lucide="landmark" class="icon-portal-logo"></i>
            </div>
            <h1 class="login-title">بوابة الإدارة الصحية</h1>
            <p class="login-sub">إدارة المراجعة الداخلية والحوكمة</p>
            <p class="login-sub2">مديرية الشؤون الصحية بالفيوم</p>

            <div class="field-group">
                <label class="f-label" for="inp-code">كود الإدارة</label>
                <input type="text" id="inp-code" class="f-input" placeholder="أدخل كود الإدارة" autocomplete="off"
                    onkeydown="if(event.key==='Enter')document.getElementById('inp-pin').focus()">
            </div>
            <div class="field-group">
                <label class="f-label" for="inp-pin">رمز الدخول (PIN)</label>
                <input type="password" id="inp-pin" class="f-input" placeholder="أدخل رمز الدخول" maxlength="6"
                    onkeydown="if(event.key==='Enter')doLogin()">
            </div>

            <p class="error-msg" id="login-error"></p>

            <button class="btn-login" id="btn-login" onclick="doLogin()">
                <i data-lucide="log-in" class="icon-md"></i>
                تسجيل الدخول
            </button>

            <p class="lock-note">
                <i data-lucide="shield-alert" class="icon-sm"></i>
                سيتم قفل الحساب بعد 5 محاولات فاشلة
            </p>
        </div>
    </div>

    <!-- MAIN APP -->
    <div class="main-app" id="main-app">

        <header class="main-header">
            <div class="header-inner">
                <div class="header-row">
                    <div class="header-info">
                        <div class="header-badge">
                            <i data-lucide="building-2" class="icon-xs"></i>
                            بوابة الإدارة الصحية
                        </div>
                        <div class="header-name" id="hdr-manager">...</div>
                        <div class="header-sub" id="hdr-admin">...</div>
                    </div>
                    <button class="btn-logout" onclick="doLogout()">
                        <i data-lucide="log-out" class="icon-sm"></i>
                        خروج
                    </button>
                </div>
            </div>
        </header>

        <div class="stats-bar" id="stats-bar">
            <div class="stat-item">
                <div class="stat-num s-total" id="st-total">0</div>
                <div class="stat-lbl">إجمالي الأقسام</div>
            </div>
            <div class="stat-item">
                <div class="stat-num s-pending" id="st-pending">0</div>
                <div class="stat-lbl">بانتظار الرد</div>
            </div>
            <div class="stat-item">
                <div class="stat-num s-done" id="st-done">0</div>
                <div class="stat-lbl">تم الرد</div>
            </div>
        </div>

        <div class="content-wrap" id="content-wrap">
            <div class="loader-wrap">
                <div class="spinner-lg"></div>
                <p class="loader-text">جاري تحميل البيانات...</p>
            </div>
        </div>

    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/core/api.js"></script>
    <script src="assets/js/core/ui-feedback.js"></script>
    <script src="assets/js/portal.js"></script>
</body>
</html>
