<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a5c56">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">

    <title>الإشعارات | IAG System</title>
    <link rel="icon" type="image/png" href="assets/icons/favicon.png">

    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Design System (single entrypoint) -->
    <link rel="stylesheet" href="assets/css/system/iag-design-system.css">
    <!-- Page-specific styles -->
    <link rel="stylesheet" href="assets/css/notifications.css">
</head>
<body>

    <div class="menu-overlay" id="menu-overlay" onclick="closeMenu()"></div>
    <aside class="side-menu" id="side-menu">
        <div class="side-menu-header">
            <div class="menu-user-row">
                <div class="menu-avatar">
                    <i data-lucide="user"></i>
                </div>
                <div class="menu-user-info">
                    <div id="menu-user">—</div>
                    <div id="menu-role"></div>
                </div>
            </div>
        </div>
        <div class="side-menu-body">
            <nav id="side-nav"></nav>
        </div>
        <div class="menu-footer">
            <button onclick="logout()" class="btn btn-logout">
                <i data-lucide="log-out" class="icon-sm"></i> تسجيل خروج
            </button>
        </div>
    </aside>

    <header class="page-header">
        <div class="header-top">
            <button class="header-btn" onclick="toggleMenu()" aria-label="القائمة">
                <i data-lucide="menu" class="icon-md"></i>
            </button>
            <div class="header-center">
                <div class="header-badge">
                    <i data-lucide="bell" class="icon-xs"></i>
                    الإشعارات
                </div>
                <h1 class="header-title">
                    <img src="assets/icons/icon-192.png" class="header-logo" alt="شعار">
                    إدارة المراجعة الداخلية والحوكمة
                </h1>
                <p class="header-sub">Internal Audit &amp; Governance</p>
            </div>
            <button class="header-btn" onclick="goBack()" aria-label="رجوع">
                <i data-lucide="arrow-right" class="icon-md"></i>
            </button>
        </div>
    </header>

    <div class="notif-stats">
        <div class="stat-card">
            <div class="stat-icon icon-bg-blue">
                <i data-lucide="bell" class="icon-md icon-clr-blue"></i>
            </div>
            <div>
                <div class="stat-num stat-num-blue" id="total-notifs">0</div>
                <div class="stat-lbl">الإجمالي</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon icon-bg-orange">
                <i data-lucide="bell-ring" class="icon-md icon-clr-orange"></i>
            </div>
            <div>
                <div class="stat-num stat-num-orange" id="unread-notifs">0</div>
                <div class="stat-lbl">غير مقروء</div>
            </div>
        </div>
    </div>

    <div class="actions-box">
        <button onclick="markAllAsRead()" class="action-btn">
            <i data-lucide="check-check" class="icon-sm"></i>
            تحديد الكل كمقروء
        </button>
        <button onclick="clearAllNotifications()" class="action-btn btn-danger">
            <i data-lucide="trash-2" class="icon-sm"></i>
            حذف الكل
        </button>
    </div>

    <div class="filters-section">
        <div class="filter-tabs">
            <button onclick="filterNotifs('all')" class="filter-tab active" data-filter="all">
                الكل <span class="count-badge" id="count-all">0</span>
            </button>
            <button onclick="filterNotifs('unread')" class="filter-tab" data-filter="unread">
                غير مقروء <span class="count-badge" id="count-unread">0</span>
            </button>
            <button onclick="filterNotifs('read')" class="filter-tab" data-filter="read">
                مقروء <span class="count-badge" id="count-read">0</span>
            </button>
        </div>
    </div>

    <div class="notifs-container" id="notifs-list">
        <div class="loader-box">
            <i data-lucide="loader-2" class="icon-lg spin" id="initial-spinner"></i>
        </div>
    </div>

    <div class="empty-state hidden" id="empty-state">
        <div class="empty-icon">
            <i data-lucide="bell-off" class="icon-xl"></i>
        </div>
        <h3 class="empty-title">لا توجد إشعارات</h3>
    </div>

    <div class="modal-overlay" id="notif-modal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 class="modal-header-title">تفاصيل الإشعار</h3>
                <button onclick="closeNotifModal()" class="modal-close-btn" aria-label="إغلاق">
                    <i data-lucide="x" class="icon-md"></i>
                </button>
            </div>
            <div class="modal-body" id="modal-content"></div>
            <div class="modal-footer">
                <button onclick="closeNotifModal()" class="action-btn">إغلاق</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav" id="bottom-nav"></nav>

    <!-- Core layer (must load before page script) -->
    <script src="assets/js/config.js"></script>
    <script src="assets/js/core/api.js"></script>
    <script src="assets/js/core/session.js"></script>
    <script src="assets/js/core/ui-feedback.js"></script>
    <!-- Shared nav (reads session via localStorage, compatible with session.js) -->
    <script src="assets/js/nav.js"></script>
    <!-- Page script -->
    <script src="assets/js/notifications.js" defer></script>
</body>
</html>
