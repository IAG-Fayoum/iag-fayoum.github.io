<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f766e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>ملف الموظف | IAG System</title>
    <link rel="icon" type="image/png" href="assets/icons/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Cairo', sans-serif;
    background: #f0f4f8;
    color: #1e293b;
    min-height: 100vh;
    padding-bottom: 90px;
    -webkit-tap-highlight-color: transparent;
}

:root {
    --teal:    #0f766e;
    --teal2:   #134e4a;
    --teal3:   #ccfbf1;
    --red:     #dc2626;
    --orange:  #d97706;
    --blue:    #2563eb;
    --green:   #16a34a;
    --purple:  #7c3aed;
    --gray:    #64748b;
}

/* ══ HEADER ══ */
.emp-header {
    background: linear-gradient(150deg, #134e4a 0%, #0f766e 60%, #0d9488 100%);
    padding: 0 0 70px;
    position: relative;
    overflow: hidden;
    padding-top: max(0px, env(safe-area-inset-top));
}
.emp-header::before {
    content: '';
    position: absolute;
    top: -60px; left: -60px;
    width: 220px; height: 220px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
}
.emp-header::after {
    content: '';
    position: absolute;
    bottom: 20px; right: -40px;
    width: 160px; height: 160px;
    background: rgba(255,255,255,0.03);
    border-radius: 50%;
}

.header-topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px 10px;
    position: relative;
    z-index: 2;
}
.hdr-btn {
    width: 40px; height: 40px;
    border-radius: 12px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.15);
    color: white;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    backdrop-filter: blur(4px);
    position: relative;
}
.notif-dot {
    position: absolute;
    top: 6px; right: 6px;
    width: 8px; height: 8px;
    background: #f87171;
    border-radius: 50%;
    border: 1.5px solid #0f766e;
}

.profile-section {
    padding: 0 18px 0;
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 14px;
}
.avatar-wrap {
    width: 62px; height: 62px;
    border-radius: 18px;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 1.6rem;
    font-weight: 900;
    color: white;
    backdrop-filter: blur(8px);
}
.profile-info { flex: 1; }
.emp-greeting { font-size: 0.72rem; color: #99f6e4; font-weight: 600; margin-bottom: 2px; }
.emp-name { font-size: 1.1rem; font-weight: 900; color: white; line-height: 1.2; }
.emp-role {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.2);
    color: #ccfbf1;
    font-size: 0.7rem; font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    margin-top: 5px;
    backdrop-filter: blur(4px);
}

/* ══ STATS FLOAT CARD ══ */
.stats-float {
    margin: -50px 14px 0;
    position: relative;
    z-index: 10;
    background: white;
    border-radius: 20px;
    padding: 18px 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.10);
    border: 1px solid rgba(226,232,240,0.8);
}
.stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
}
.stat-item {
    text-align: center;
    padding: 6px 4px;
    position: relative;
    cursor: pointer;
    border-radius: 12px;
    transition: background 0.15s;
}
.stat-item:hover { background: #f8fafc; }
.stat-item.active { background: var(--teal3); }
.stat-item + .stat-item::before {
    content: '';
    position: absolute;
    right: 0; top: 20%; bottom: 20%;
    width: 1px;
    background: #e2e8f0;
}
.stat-num {
    font-size: 1.8rem;
    font-weight: 900;
    line-height: 1;
    margin-bottom: 3px;
}
.stat-lbl {
    font-size: 0.65rem;
    font-weight: 700;
    color: #94a3b8;
    white-space: nowrap;
}
.stat-late  { color: var(--red); }
.stat-new   { color: var(--blue); }
.stat-done  { color: var(--green); }
.stat-total { color: #334155; }
.stat-pend  { color: var(--orange); }
.stat-fol   { color: var(--gray); }

/* Progress bar */
.progress-wrap {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid #f1f5f9;
}
.progress-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
}
.progress-label span { font-size: 0.72rem; font-weight: 700; color: #64748b; }
.progress-label strong { font-size: 0.8rem; font-weight: 900; color: var(--teal); }
.progress-bar {
    height: 8px;
    background: #e2e8f0;
    border-radius: 10px;
    overflow: hidden;
}
.progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal), #0d9488);
    border-radius: 10px;
    transition: width 0.8s ease;
}
.compare-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
    margin-top: 6px;
}
.compare-up   { background: #dcfce7; color: #16a34a; }
.compare-down { background: #fef2f2; color: var(--red); }

/* ══ SECTION HEADER ══ */
.section-hdr {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 16px 10px;
}
.section-title { font-size: 0.95rem; font-weight: 800; color: #1e293b; }
.section-count {
    font-size: 0.7rem;
    font-weight: 700;
    color: #94a3b8;
    background: #f1f5f9;
    padding: 3px 10px;
    border-radius: 10px;
}

/* ══ SEARCH BAR ══ */
.search-bar {
    margin: 0 14px 12px;
    position: relative;
}
.search-input {
    width: 100%;
    height: 44px;
    border: 1.5px solid #e2e8f0;
    border-radius: 12px;
    padding: 0 44px 0 12px;
    font-size: 0.88rem;
    font-family: 'Cairo', sans-serif;
    color: #1e293b;
    background: white;
    outline: none;
    transition: 0.2s;
}
.search-input:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(15,118,110,0.1);
}
.search-icon {
    position: absolute;
    right: 14px; top: 12px;
    width: 20px; height: 20px;
    color: #94a3b8;
    pointer-events: none;
}

/* ══ FILTER CHIPS ══ */
.filter-chips {
    display: flex;
    gap: 8px;
    padding: 0 14px 12px;
    overflow-x: auto;
    scrollbar-width: none;
}
.filter-chips::-webkit-scrollbar { display: none; }
.chip {
    white-space: nowrap;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
    border: 1.5px solid #e2e8f0;
    background: white;
    color: #475569;
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    transition: 0.15s;
    flex-shrink: 0;
}
.chip:hover { background: #f8fafc; }
.chip.active { background: var(--teal); color: white; border-color: var(--teal); }
.chip.chip-late.active   { background: var(--red);    border-color: var(--red); }
.chip.chip-new.active    { background: var(--blue);   border-color: var(--blue); }
.chip.chip-pend.active   { background: var(--orange); border-color: var(--orange); }
.chip.chip-done.active   { background: var(--green);  border-color: var(--green); }
.chip.chip-fol.active    { background: var(--gray);   border-color: var(--gray); }

/* ══ TASK CARDS ══ */
.tasks-list {
    padding: 0 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.task-card {
    background: white;
    border-radius: 18px;
    overflow: hidden;
    border: 1.5px solid #e8edf2;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    transition: transform 0.2s, box-shadow 0.2s;
}
.task-card:active { transform: scale(0.99); }

.card-top {
    padding: 14px 16px 12px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
}
.card-type-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.68rem;
    font-weight: 800;
    padding: 4px 10px;
    border-radius: 8px;
    flex-shrink: 0;
}
.type-in  { background: #eff6ff; color: var(--blue);   border: 1px solid #bfdbfe; }
.type-out { background: #f0fdf4; color: var(--green);  border: 1px solid #bbf7d0; }
.type-mro { background: #fdf4ff; color: var(--purple); border: 1px solid #e9d5ff; }
.type-cmp { background: #fff7ed; color: var(--orange); border: 1px solid #fed7aa; }

.status-pill {
    font-size: 0.68rem;
    font-weight: 800;
    padding: 4px 10px;
    border-radius: 8px;
    flex-shrink: 0;
}
.s-new      { background: #eff6ff; color: var(--blue);   border: 1px solid #bfdbfe; }
.s-pending  { background: #f0fdf4; color: var(--green);  border: 1px solid #bbf7d0; }
.s-approved { background: #ecfdf5; color: #047857;       border: 1px solid #a7f3d0; }
.s-followup { background: #f8fafc; color: var(--gray);   border: 1px solid #e2e8f0; }
.s-late     { background: #fef2f2; color: var(--red);    border: 1px solid #fecaca; }

.card-subject {
    padding: 0 16px 10px;
    font-size: 0.92rem;
    font-weight: 800;
    color: #0f172a;
    line-height: 1.5;
}
.card-meta {
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    gap: 5px;
}
.meta-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.78rem;
    color: #64748b;
    font-weight: 600;
}
.meta-row svg { flex-shrink: 0; }

/* ══ DEADLINE INDICATOR ══ */
.deadline-bar {
    margin: 10px 16px 0;
    display: flex;
    align-items: center;
    gap: 8px;
}
.dl-track {
    flex: 1;
    height: 4px;
    background: #f1f5f9;
    border-radius: 4px;
    overflow: hidden;
}
.dl-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.5s;
}
.dl-ok   { background: var(--teal); }
.dl-warn { background: var(--orange); }
.dl-late { background: var(--red); }
.dl-label { font-size: 0.65rem; font-weight: 800; white-space: nowrap; }
.dl-ok-txt   { color: var(--teal); }
.dl-warn-txt { color: var(--orange); }
.dl-late-txt { color: var(--red); }

/* ══ CARD ATTACHMENTS ══ */
.card-attachments {
    padding: 10px 16px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
}
.att-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 5px 10px;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid transparent;
    font-family: 'Cairo', sans-serif;
    transition: 0.15s;
}
.att-has   { background: #f0fdf4; color: #065f46; border-color: #bbf7d0; }
.att-has:hover { background: #dcfce7; }
.att-miss  { background: #fef9c3; color: #92400e; border-color: #fde68a; }
.att-miss:hover { background: #fef08a; }
.att-none  { background: #f8fafc; color: #cbd5e1; border-color: #e2e8f0; cursor: default; }
.att-upload { background: #eff6ff; color: var(--blue); border-color: #bfdbfe; }
.att-upload:hover { background: #dbeafe; }

/* ══ CARD FOOTER ══ */
.card-footer {
    margin: 8px 14px 14px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
}
.btn-detail {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    height: 40px;
    border-radius: 10px;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    border: none;
    font-family: 'Cairo', sans-serif;
    transition: 0.15s;
}
.btn-view-detail {
    background: #f0fdfa;
    color: var(--teal);
    border: 1.5px solid var(--teal3);
}
.btn-view-detail:hover { background: var(--teal3); }
.btn-view-files {
    background: #eff6ff;
    color: var(--blue);
    border: 1.5px solid #bfdbfe;
}
.btn-view-files:hover { background: #dbeafe; }

/* ══ MODAL ══ */
.modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,23,42,0.65);
    z-index: 200;
    display: none;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(3px);
    padding-bottom: env(safe-area-inset-bottom);
}
.modal-overlay.open { display: flex; animation: fadeUp 0.25s ease; }
@keyframes fadeUp {
    from { opacity: 0; }
    to   { opacity: 1; }
}
.modal-sheet {
    background: white;
    width: 100%;
    max-width: 580px;
    max-height: 90vh;
    border-radius: 24px 24px 0 0;
    display: flex;
    flex-direction: column;
    animation: slideUp 0.3s ease;
}
@keyframes slideUp {
    from { transform: translateY(40px); }
    to   { transform: translateY(0); }
}
.sheet-handle {
    width: 40px; height: 4px;
    background: #e2e8f0;
    border-radius: 4px;
    margin: 12px auto 0;
    flex-shrink: 0;
}
.sheet-header {
    padding: 14px 20px 12px;
    border-bottom: 1px solid #f1f5f9;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-shrink: 0;
}
.sheet-title { font-size: 1rem; font-weight: 800; color: #0f172a; }
.sheet-id    { font-size: 0.72rem; color: #94a3b8; font-family: monospace; margin-top: 2px; }
.sheet-close {
    width: 32px; height: 32px;
    border-radius: 10px;
    background: #f1f5f9;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #64748b;
    flex-shrink: 0;
    margin-top: 2px;
}
.sheet-close:hover { background: #fef2f2; color: var(--red); }
.sheet-body {
    overflow-y: auto;
    padding: 16px 20px;
    flex: 1;
}

/* Detail rows in modal */
.detail-section { margin-bottom: 18px; }
.detail-section-title {
    font-size: 0.72rem;
    font-weight: 800;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid #f1f5f9;
}
.detail-row {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 8px 0;
    border-bottom: 1px solid #f8fafc;
}
.detail-row:last-child { border-bottom: none; }
.detail-lbl { font-size: 0.72rem; font-weight: 700; color: #94a3b8; }
.detail-val { font-size: 0.9rem; font-weight: 600; color: #1e293b; line-height: 1.5; }

/* Edit field in modal */
.edit-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
}
.edit-inp {
    flex: 1;
    height: 38px;
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
    padding: 0 12px;
    font-size: 0.85rem;
    font-family: 'Cairo', sans-serif;
    color: #1e293b;
    background: #fffbeb;
    outline: none;
}
.edit-inp:focus { border-color: var(--teal); background: white; box-shadow: 0 0 0 3px rgba(15,118,110,0.1); }
.btn-save {
    height: 38px;
    padding: 0 16px;
    background: var(--teal);
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: 700;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    transition: 0.15s;
    white-space: nowrap;
}
.btn-save:hover { background: var(--teal2); }
.btn-save:disabled { background: #94a3b8; cursor: not-allowed; }

/* File upload area */
.upload-zone {
    border: 2px dashed #cbd5e1;
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    cursor: pointer;
    background: #fafcff;
    transition: 0.2s;
    margin-top: 6px;
}
.upload-zone:hover { border-color: var(--blue); background: #eff6ff; }
.upload-zone.uploading { opacity: 0.6; pointer-events: none; }

/* Audit log */
.audit-item {
    display: flex;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid #f8fafc;
}
.audit-item:last-child { border-bottom: none; }
.audit-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--teal);
    flex-shrink: 0;
    margin-top: 6px;
}
.audit-text { font-size: 0.78rem; color: #475569; font-weight: 600; line-height: 1.5; }
.audit-time { font-size: 0.68rem; color: #94a3b8; margin-top: 2px; }

/* ══ EMPTY / LOADER ══ */
.loader-state {
    text-align: center;
    padding: 3rem 1rem;
    color: #94a3b8;
}
.empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: #64748b;
    background: white;
    border-radius: 16px;
    border: 1.5px dashed #e2e8f0;
}

/* ══ BOTTOM NAV ══ */
.bottom-nav {
    position: fixed;
    bottom: 0; width: 100%;
    background: white;
    border-top: 1px solid #f1f5f9;
    display: flex;
    justify-content: space-around;
    z-index: 90;
    padding: 8px 0;
    padding-bottom: max(8px, env(safe-area-inset-bottom));
    box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
}
.nav-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    color: #94a3b8;
    text-decoration: none;
    font-size: 0.62rem;
    font-weight: 700;
    width: 64px;
}
.nav-btn.active { color: var(--teal); }
.nav-btn svg { width: 22px; height: 22px; }

/* ══ NOTIF BADGE ══ */
.notif-badge {
    position: absolute;
    top: -3px; right: -3px;
    min-width: 17px; height: 17px;
    background: var(--red);
    border-radius: 10px;
    font-size: 0.6rem;
    font-weight: 800;
    color: white;
    display: flex; align-items: center; justify-content: center;
    padding: 0 4px;
    border: 2px solid white;
}

/* ══ TABS ══ */
.tabs-wrap {
    display: flex;
    gap: 0;
    padding: 0 14px;
    margin-bottom: 14px;
    background: white;
    border-radius: 14px;
    margin-left: 14px;
    margin-right: 14px;
    border: 1.5px solid #e8edf2;
    overflow: hidden;
}
.tab-btn {
    flex: 1;
    height: 44px;
    font-size: 0.8rem;
    font-weight: 700;
    color: #94a3b8;
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    border-bottom: 2px solid transparent;
    transition: 0.15s;
}
.tab-btn.active { color: var(--teal); border-bottom-color: var(--teal); }

@media (min-width: 640px) {
    .stats-grid { grid-template-columns: repeat(6, 1fr); }
    .tasks-list { display: grid; grid-template-columns: repeat(2, 1fr); }
}
@media (min-width: 1024px) {
    .emp-header { padding-bottom: 80px; }
    .stats-float { max-width: 760px; margin: -60px auto 0; }
    .section-hdr, .search-bar, .filter-chips, .tasks-list, .tabs-wrap { max-width: 760px; margin-left: auto; margin-right: auto; }
    .tasks-list { display: grid; grid-template-columns: repeat(2, 1fr); padding: 0; }
    .bottom-nav { display: none; }
}

.hidden { display: none !important; }
.animate-spin { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>

</head>
<body>

<!-- ══ HEADER ══ -->

<header class="emp-header">
    <div class="header-topbar">
        <button class="hdr-btn" onclick="logout()">
            <i data-lucide="log-out" style="width:18px;height:18px;color:white"></i>
        </button>
        <div style="display:flex;gap:8px">
            <a href="notifications.html" class="hdr-btn" style="text-decoration:none">
                <i data-lucide="bell" style="width:18px;height:18px;color:white"></i>
                <span class="notif-dot" id="notif-dot" style="display:none"></span>

<script src="assets/js/config.js"></script>

<script src="assets/js/auth.js"></script>

<script>
lucide.createIcons();

let myTasks   = [];
let currentUser = null;
let activeStatFilter = '';
let activeChip = '';
let activeTab  = 'tasks';

// ── INIT ──
document.addEventListener('DOMContentLoaded', async () => {
    if (typeof auth === 'undefined') { window.location.href = 'index.html'; return; }
    const user = auth.checkAuth();
    if (!user) { window.location.href = 'index.html'; return; }
    currentUser = user;

    // لو مدير — يروح coordinator
    if (user.role === 'مدير' || user.role === 'منسق') {
        window.location.href = 'coordinator.html';
        return;
    }

    // عرض بيانات الموظف
    document.getElementById('emp-name-display').textContent = user.name;
    document.getElementById('emp-role-display').textContent  = user.role || 'موظف';

    // الحرف الأول من الاسم في الأفاتار
    const initials = (user.name || '').trim().split(' ').map(w => w[0]).slice(0,2).join('');
    document.getElementById('avatar-initials').textContent = initials || '؟';

    await loadMyTasks(user.name);
});

// ── LOAD ──
async function loadMyTasks(username) {
    try {
        const res  = await fetch(CONFIG.API_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'getAllData', role: 'موظف', name: username })
        });
        const data = await res.json();

        if (data.success) {
            // فلترة مهام الموظف بالاسم
            const allTasks = data.tasks || [];
            myTasks = allTasks.filter(t =>
                (t.assignee || '').trim() === username.trim()
            );
            renderStats();
            renderFiltered();
        } else {
            showEmpty('لا توجد بيانات');
        }
    } catch(e) {
        showEmpty('خطأ في الاتصال بالخادم');
    }
}

// ── STATS ──
function renderStats() {
    let c = { total:0, late:0, new:0, pend:0, done:0, fol:0 };
    myTasks.forEach(t => {
        c.total++;
        const s = t.status || '';
        if      (s.includes('متأخر'))    c.late++;
        else if (s.includes('جديد'))     c.new++;
        else if (s.includes('بانتظار'))  c.pend++;
        else if (s.includes('تم'))       c.done++;
        else if (s.includes('متابعة'))   c.fol++;
    });

    document.getElementById('sc-total').textContent = c.total;
    document.getElementById('sc-late').textContent  = c.late;
    document.getElementById('sc-new').textContent   = c.new;
    document.getElementById('sc-pend').textContent  = c.pend;
    document.getElementById('sc-done').textContent  = c.done;
    document.getElementById('sc-fol').textContent   = c.fol;

    const pct = c.total ? Math.round((c.done / c.total) * 100) : 0;
    document.getElementById('progress-pct').textContent = pct + '%';
    document.getElementById('progress-fill').style.width = pct + '%';
}

// ── FILTER ──
function filterStat(status) {
    activeStatFilter = activeStatFilter === status ? '' : status;
    // تحديث الكروت
    document.querySelectorAll('.stat-item').forEach(el => el.classList.remove('active'));
    const map = {'':'st-all','متأخر':'st-late','جديد':'st-new','بانتظار':'st-pend','تم الاعتماد':'st-done','بحاجة':'st-fol'};
    const el = document.getElementById(map[activeStatFilter] || 'st-all');
    if (el) el.classList.add('active');
    // مزامنة الـ chips
    document.querySelectorAll('.chip').forEach(c => {
        c.classList.toggle('active', c.dataset.val === activeStatFilter);
    });
    renderFiltered();
}

function setChip(el, val) {
    activeChip = activeChip === val ? '' : val;
    activeStatFilter = activeChip;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    if (activeChip === val) el.classList.add('active');
    else document.querySelector('.chip[data-val=""]').classList.add('active');
    // مزامنة الـ stats
    document.querySelectorAll('.stat-item').forEach(c => c.classList.remove('active'));
    const map = {'':'st-all','متأخر':'st-late','جديد':'st-new','بانتظار':'st-pend','تم الاعتماد':'st-done','بحاجة':'st-fol'};
    const se = document.getElementById(map[activeStatFilter] || 'st-all');
    if (se) se.classList.add('active');
    renderFiltered();
}

function switchTab(tab) {
    activeTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`tab-${tab === 'tasks' ? 'tasks' : tab === 'inspections' ? 'insp' : 'comp'}`).classList.add('active');
    renderFiltered();
}

function renderFiltered() {
    const search = (document.getElementById('f-search').value || '').toLowerCase();

    let filtered = myTasks.filter(t => {
        // تبويب
        if (activeTab === 'inspections') {
            const tp = (t.transactionType || t.docType || '').toLowerCase();
            if (!tp.includes('مرور') && !tp.includes('فحص') && !tp.includes('inspection')) return false;
        } else if (activeTab === 'complaints') {
            const tp = (t.transactionType || t.docType || '').toLowerCase();
            if (!tp.includes('شكو') && !tp.includes('complaint')) return false;
        }

        // فلتر الحالة
        if (activeStatFilter) {
            if (!(t.status || '').includes(activeStatFilter)) return false;
        }

        // بحث
        if (search) {
            const hay = `${t.subject} ${t.source} ${t.id} ${t.entity || ''}`.toLowerCase();
            if (!hay.includes(search)) return false;
        }

        return true;
    });

    renderCards(filtered);
}

// ── RENDER CARDS ──
function renderCards(tasks) {
    const list = document.getElementById('tasks-list');
    if (!tasks.length) {
        list.innerHTML = `
            <div class="empty-state" style="grid-column:1/-1">
                <i data-lucide="inbox" style="width:36px;height:36px;color:#e2e8f0;display:block;margin:0 auto 10px"></i>
                <p style="font-weight:700">لا توجد مهام مطابقة</p>
            </div>`;
        lucide.createIcons();
        return;
    }

    list.innerHTML = tasks.map(t => {
        const status    = t.status || '';
        const docType   = t.transactionType || t.docType || '';
        const isOut     = docType.includes('صادر');
        const isMro     = docType.toLowerCase().includes('مرور') || docType.includes('فحص');
        const isCmp     = docType.includes('شكو');
        const hasAttach = t.attachment && t.attachment.toString().trim() && t.attachment !== 'undefined';
        const hasReview = t.reviewFile  && t.reviewFile.toString().trim()  && t.reviewFile !== 'undefined';
        const hasArchive= t.archive     && t.archive.toString().trim()     && t.archive !== 'undefined';
        const isFullyDone = status === 'تم الاعتماد والأرشفة';
        const isPending   = status.includes('بانتظار');

        // status pill class
        let sCls = 's-new';
        if      (status.includes('متأخر'))    sCls = 's-late';
        else if (status.includes('بانتظار'))  sCls = 's-pending';
        else if (status.includes('تم'))       sCls = 's-approved';
        else if (status.includes('متابعة'))   sCls = 's-followup';

        // type badge
        let typeBadge = '', typeCls = 'type-in';
        if (isOut)      { typeBadge = '📤 صادر';  typeCls = 'type-out'; }
        else if (isMro) { typeBadge = '🔍 مرور';  typeCls = 'type-mro'; }
        else if (isCmp) { typeBadge = '📣 شكوى';  typeCls = 'type-cmp'; }
        else            { typeBadge = '📥 وارد';  typeCls = 'type-in';  }

        // deadline indicator
        let dlHtml = '';
        if (t.deadline && !isFullyDone) {
            const now = new Date();
            const dl  = new Date(parseDateToISO(t.deadline) || t.deadline);
            const diff = Math.ceil((dl - now) / 86400000);
            let dlCls = 'dl-ok', dlTxtCls = 'dl-ok-txt', dlPct = 70, dlTxt = `${diff} يوم متبقي`;
            if      (diff <= 0)  { dlCls = 'dl-late';  dlTxtCls = 'dl-late-txt';  dlPct = 100; dlTxt = `متأخر ${Math.abs(diff)} يوم`; }
            else if (diff <= 3)  { dlCls = 'dl-warn';  dlTxtCls = 'dl-warn-txt';  dlPct = 85;  }
            dlHtml = `<div class="deadline-bar">
                <div class="dl-track"><div class="dl-fill ${dlCls}" style="width:${dlPct}%"></div></div>
                <span class="dl-label ${dlTxtCls}">${dlTxt}</span>
            </div>`;
        }

        // attachments
        let attHtml = '';
        if (hasAttach)
            attHtml += `<button onclick="event.stopPropagation();window.open('${t.attachment}')" class="att-pill att-has">📥 مرفق الوارد</button>`;
        else if (!isOut)
            attHtml += `<span class="att-pill att-none">📥 بدون مرفق</span>`;

        if (hasReview)
            attHtml += `<button onclick="event.stopPropagation();window.open('${t.reviewFile}')" class="att-pill att-has">📄 ملف المراجعة</button>`;
        else if (isPending)
            attHtml += `<span class="att-pill att-miss">📄 المراجعة قيد الإعداد</span>`;

        if (hasArchive)
            attHtml += `<button onclick="event.stopPropagation();window.open('${t.archive}')" class="att-pill att-has">📎 الصادر النهائي</button>`;
        else if (isFullyDone)
            attHtml += `<button onclick="event.stopPropagation();openModal('${t.id}')" class="att-pill att-upload">📤 رفع الصادر</button>`;

        return `
        <div class="task-card" onclick="openModal('${t.id}')">
            <div class="card-top">
                <span class="card-type-badge ${typeCls}">${typeBadge}</span>
                <span class="status-pill ${sCls}">${status}</span>
            </div>
            <div class="card-subject">${t.subject}</div>
            <div class="card-meta">
                <div class="meta-row">
                    <i data-lucide="building-2" style="width:14px;height:14px;color:#0f766e"></i>
                    <span>${t.source || 'غير محدد'}</span>
                </div>
                <div class="meta-row">
                    <i data-lucide="calendar" style="width:14px;height:14px;color:#0f766e"></i>
                    <span>${formatArabicDate(t.date)}</span>
                    ${t.id ? `<span style="margin-right:auto;font-size:0.65rem;color:#94a3b8;font-family:monospace">#${t.id}</span>` : ''}
                </div>
                ${t.entity ? `<div class="meta-row">
                    <i data-lucide="map-pin" style="width:14px;height:14px;color:#0f766e"></i>
                    <span>${t.entity}</span>
                </div>` : ''}
            </div>
            ${dlHtml}
            ${attHtml ? `<div class="card-attachments">${attHtml}</div>` : ''}
            <div class="card-footer">
                <button class="btn-detail btn-view-detail" onclick="event.stopPropagation();openModal('${t.id}')">
                    <i data-lucide="file-text" style="width:15px;height:15px"></i>
                    التفاصيل
                </button>
                <button class="btn-detail btn-view-files" onclick="event.stopPropagation();openModal('${t.id}')">
                    <i data-lucide="paperclip" style="width:15px;height:15px"></i>
                    المرفقات
                </button>
            </div>
        </div>`;
    }).join('');

    lucide.createIcons();
}

// ── MODAL ──
function openModal(id) {
    const t = myTasks.find(x => x.id == id);
    if (!t) return;

    document.getElementById('sh-title').textContent = t.subject || 'تفاصيل المعاملة';
    document.getElementById('sh-id').textContent    = '#' + t.id;

    const status     = t.status || '';
    const isPending  = status.includes('بانتظار');
    const isFullyDone= status === 'تم الاعتماد والأرشفة';
    const hasAttach  = t.attachment && t.attachment.toString().trim() && t.attachment !== 'undefined';
    const hasReview  = t.reviewFile && t.reviewFile.toString().trim() && t.reviewFile !== 'undefined';
    const hasArchive = t.archive    && t.archive.toString().trim()    && t.archive !== 'undefined';

    const ro = (lbl, val) => val ? `
        <div class="detail-row">
            <div class="detail-lbl">${lbl}</div>
            <div class="detail-val">${val}</div>
        </div>` : '';

    const link = (lbl, url, icon='📎') => url ? `
        <div class="detail-row">
            <div class="detail-lbl">${lbl}</div>
            <div class="detail-val">
                <a href="${url}" target="_blank"
                   style="color:var(--teal);text-decoration:none;font-weight:700;display:inline-flex;align-items:center;gap:6px">
                   ${icon} فتح الملف
                </a>
            </div>
        </div>` : '';

    let html = '';

    // ── بيانات المعاملة ──
    html += `<div class="detail-section">
        <div class="detail-section-title">بيانات المعاملة</div>
        ${ro('الموضوع', `<strong>${t.subject}</strong>`)}
        ${ro('الجهة الواردة منها', t.source)}
        ${ro('محل التنفيذ', t.entity)}
        ${ro('نوع المعاملة', t.transactionType || t.docType)}
        ${ro('تاريخ الوارد', formatArabicDate(t.date))}
        ${ro('تاريخ التكليف', formatArabicDate(t.assignDate))}
        ${ro('الموعد النهائي', t.deadline ? formatArabicDate(t.deadline) : null)}
        ${ro('الأهمية', t.importance)}
        ${ro('الحالة الحالية', `<span style="font-weight:800;color:var(--teal)">${status}</span>`)}
        ${t.completionDate ? ro('تاريخ الإنجاز', formatArabicDate(t.completionDate)) : ''}
        ${t.notes ? `<div class="detail-row"><div class="detail-lbl">ملاحظات</div>
            <div class="detail-val" style="background:#fffbeb;padding:8px;border-radius:8px;font-size:0.85rem">${t.notes}</div>
        </div>` : ''}
    </div>`;

    // ── المرفقات ──
    html += `<div class="detail-section">
        <div class="detail-section-title">المرفقات والملفات</div>`;

    // مرفق الوارد
    if (hasAttach) {
        html += link('📥 مرفق الوارد', t.attachment, '📥');
    } else {
        html += `<div class="detail-row">
            <div class="detail-lbl">📥 مرفق الوارد</div>
            <div class="detail-val" style="color:#94a3b8">لا يوجد مرفق</div>
        </div>`;
    }

    // ملف المراجعة
    if (hasReview) {
        html += link('📄 ملف المراجعة', t.reviewFile, '📄');
    } else if (isPending) {
        html += `<div class="detail-row">
            <div class="detail-lbl">📄 ملف المراجعة</div>
            <div class="detail-val" style="color:var(--orange);font-weight:700">⏳ قيد المعالجة</div>
        </div>`;
    }

    // الصادر النهائي
    if (hasArchive) {
        html += link('📎 الصادر النهائي', t.archive, '📎');
    } else if (isFullyDone) {
        // الموظف يقدر يرفع الصادر
        html += `<div class="detail-row">
            <div class="detail-lbl">📎 الصادر النهائي <span style="background:#fef3c7;color:#92400e;font-size:0.65rem;padding:2px 7px;border-radius:6px;font-weight:700">⚠ ناقص</span></div>
            <div class="upload-zone" id="upload-area-${t.id}" onclick="document.getElementById('file-${t.id}').click()">
                <input type="file" id="file-${t.id}" style="display:none"
                    onchange="uploadFile('${t.id}',this,'archive')"
                    accept=".pdf,.doc,.docx,.jpg,.jpeg,.png">
                <i data-lucide="upload-cloud" style="width:24px;height:24px;display:block;margin:0 auto 6px;color:#94a3b8"></i>
                <p style="font-size:0.82rem;font-weight:700;color:#64748b">اضغط لرفع ملف الصادر</p>
                <p style="font-size:0.68rem;color:#94a3b8;margin-top:2px">PDF أو Word أو صورة</p>
            </div>
            <p id="upload-status-${t.id}" style="font-size:0.72rem;margin-top:4px;display:none"></p>
        </div>`;
    }

    html += `</div>`;

    // ── سجل النشاط (Audit Log) ──
    if (t.auditLog && t.auditLog.length) {
        html += `<div class="detail-section">
            <div class="detail-section-title">سجل النشاط</div>`;
        t.auditLog.forEach(log => {
            html += `<div class="audit-item">
                <div class="audit-dot"></div>
                <div>
                    <div class="audit-text">${log.action || log}</div>
                    <div class="audit-time">${log.time || ''}</div>
                </div>
            </div>`;
        });
        html += `</div>`;
    }

    document.getElementById('sh-body').innerHTML = html;
    document.getElementById('detail-modal').classList.add('open');
    lucide.createIcons();
}

function closeModal() {
    document.getElementById('detail-modal').classList.remove('open');
}

// ── UPLOAD ──
async function uploadFile(taskId, inputEl, fieldName) {
    const file = inputEl.files[0];
    if (!file) return;
    if (file.size > 10 * 1024 * 1024) { alert('حجم الملف أكبر من 10 ميجا'); return; }

    const area   = document.getElementById(`upload-area-${taskId}`);
    const status = document.getElementById(`upload-status-${taskId}`);
    area.classList.add('uploading');
    area.innerHTML = `<p style="font-size:0.85rem;font-weight:700;color:var(--teal)">⏳ جاري الرفع...</p>`;
    if (status) { status.style.display = 'block'; status.textContent = `📁 ${file.name}`; }

    try {
        const base64 = await fileToBase64(file);
        const res    = await fetch(CONFIG.API_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: 'uploadArchiveFile',
                taskId,
                updatedBy: currentUser.name,
                fileName:  `صادر_${taskId}_${file.name}`,
                fileBase64: base64,
                mimeType: file.type
            })
        });
        const data = await res.json();

        if (data.success) {
            const task = myTasks.find(x => x.id == taskId);
            if (task) task.archive = data.fileUrl;
            const parent = area.closest('.detail-row');
            parent.innerHTML = `
                <div class="detail-lbl">📎 الصادر النهائي ✅</div>
                <div class="detail-val">
                    <a href="${data.fileUrl}" target="_blank"
                       style="color:var(--teal);font-weight:700">📎 فتح الصادر</a>
                </div>`;
            renderFiltered();
        } else {
            alert('❌ ' + (data.error || 'فشل الرفع'));
            area.classList.remove('uploading');
            area.innerHTML = `<p style="font-size:0.82rem;color:var(--red);font-weight:700">❌ فشل — اضغط للمحاولة</p>`;
        }
    } catch(e) {
        alert('❌ خطأ في الاتصال');
        area.classList.remove('uploading');
        area.innerHTML = `<p style="font-size:0.82rem;color:var(--red);font-weight:700">❌ خطأ في الاتصال</p>`;
    }
}

function fileToBase64(file) {
    return new Promise((res, rej) => {
        const r = new FileReader();
        r.onload  = () => res(r.result.split(',')[1]);
        r.onerror = rej;
        r.readAsDataURL(file);
    });
}

// ── HELPERS ──
function showEmpty(msg) {
    document.getElementById('tasks-list').innerHTML =
        `<div class="empty-state" style="grid-column:1/-1">
            <i data-lucide="alert-circle" style="width:32px;height:32px;color:#e2e8f0;display:block;margin:0 auto 8px"></i>
            <p style="font-weight:700">${msg}</p>
        </div>`;
    lucide.createIcons();
}

function parseDateToISO(d) {
    if (!d) return null;
    if (/^\d{4}-\d{2}-\d{2}$/.test(d)) return d;
    const p = d.split('/');
    if (p.length === 3) return `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
    return null;
}

function formatArabicDate(d) {
    if (!d) return '-';
    const p = d.split('/');
    if (p.length !== 3) return d;
    return new Date(p[2], p[1]-1, p[0])
        .toLocaleDateString('ar-EG', { day:'numeric', month:'long', year:'numeric' });
}

function logout() {
    if (confirm('هل تريد تسجيل الخروج؟')) {
        localStorage.removeItem('iag_user');
        window.location.href = 'index.html';
    }
}
