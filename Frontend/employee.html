<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a5c56">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <title>ملف الموظف | IAG System</title>
    <link rel="icon" type="image/png" href="assets/icons/favicon.png">

    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/theme.css">
    <link rel="stylesheet" href="assets/css/iag-theme.css">
    <link rel="stylesheet" href="card.css">
    <link rel="stylesheet" href="assets/css/employee.css">
</head>
<body>

<!-- SIDE MENU -->
<div class="menu-overlay" id="menu-overlay" onclick="closeMenu()"></div>
<aside class="side-menu" id="side-menu">
    <div class="side-menu-header">
        <div style="display:flex;align-items:center;gap:12px">
            <div style="width:40px;height:40px;background:rgba(255,255,255,0.15);border-radius:50%;display:flex;align-items:center;justify-content:center">
                <i data-lucide="user" style="width:20px;height:20px;color:white"></i>
            </div>
            <div>
                <div style="font-weight:900;font-size:0.9rem;color:white" id="menu-user">—</div>
                <div style="font-size:0.72rem;color:#99f6e4;font-weight:800" id="menu-role"></div>
            </div>
        </div>
    </div>
    <div class="side-menu-body">
        <nav id="side-nav"></nav>
    </div>
    <div class="menu-footer">
        <button onclick="logout()" class="btn btn-ghost" style="width:100%;color:var(--danger);gap:8px;justify-content:center">
            <i data-lucide="log-out" style="width:16px;height:16px"></i> تسجيل خروج
        </button>
    </div>
</aside>

<!-- HEADER -->
<header class="page-header">
    <div class="header-top">
        <button class="header-btn" onclick="toggleMenu()">
            <i data-lucide="menu" style="width:20px;height:20px"></i>
        </button>
        <div class="header-center">
            <div class="header-badge">
                <i data-lucide="user" style="width:12px;height:12px"></i>
                ملفي
            </div>
            <h1 class="header-title">
                <img src="assets/icons/icon-192.png" class="header-logo" alt="شعار الإدارة">
                إدارة المراجعة الداخلية والحوكمة
            </h1>
            <p class="header-sub">Internal Audit &amp; Governance</p>
            <p class="header-user" id="header-emp-name"></p>
        </div>
        <button class="header-btn" onclick="window.location.href='notifications.html'">
            <i data-lucide="bell" style="width:20px;height:20px"></i>
            <span class="notif-dot"></span>
        </button>
    </div>
</header>

<!-- FILTER CONTAINER (shared) -->
<div class="filter-container" id="filter-bar">

    <!-- فلتر مهامي -->
    <div id="filter-tasks-view" class="filter-grid">
        <div class="filter-item-search">
            <label class="f-label">بحث شامل</label>
            <div class="search-wrapper">
                <input type="text" id="f-search" class="f-input search-input" placeholder="رقم، موضوع، جهة..." oninput="applyFilters()">
                <i data-lucide="search" class="search-icon"></i>
            </div>
        </div>
        <div class="filter-item">
            <label class="f-label">الجهة</label>
            <select id="f-source" class="f-input" onchange="applyFilters()">
                <option value="">كل الجهات</option>
            </select>
        </div>
        <div class="filter-item">
            <label class="f-label">من تاريخ</label>
            <input type="date" id="f-start" class="f-input" onchange="applyFilters()">
        </div>
        <div class="filter-item">
            <label class="f-label">إلى تاريخ</label>
            <input type="date" id="f-end" class="f-input" onchange="applyFilters()">
        </div>
        <div class="filter-actions">
            <button onclick="window.print()" class="btn-print" title="طباعة">
                <i data-lucide="printer" style="width:20px;height:20px"></i>
            </button>
        </div>
    </div>

    <!-- فلتر ملفاتي -->
    <div id="filter-files-view" class="files-filter-row hidden">
        <div class="files-search-box">
            <i data-lucide="search" class="fsi"></i>
            <input type="text" id="files-search" placeholder="ابحث في ملفاتك..." oninput="renderFilesTree()">
        </div>
        <button class="type-filter-btn active-all" id="ftype-all"  onclick="setFileType('all')">الكل</button>
        <button class="type-filter-btn"            id="ftype-insp" onclick="setFileType('insp')">🔍 مرور</button>
        <button class="type-filter-btn"            id="ftype-comp" onclick="setFileType('comp')">📣 شكاوى</button>
    </div>

</div>

<!-- STATS (مهامي فقط) -->
<div class="stats-wrapper" id="stats-wrapper">
    <div class="stats-row-big">
        <div class="stat-card-big active" onclick="filterStatus('')" id="st-total">
            <span class="num txt-total" id="c-total">0</span><span class="lbl">الإجمالي</span>
        </div>
        <div class="stat-card-big" onclick="filterStatus('متأخر')" id="st-late">
            <span class="num txt-late" id="c-late">0</span><span class="lbl">متأخر</span>
        </div>
    </div>
    <div class="stats-row-small">
        <div class="stat-card-small" onclick="filterStatus('جديد')" id="st-new">
            <span class="num txt-new" id="c-new">0</span><span class="lbl">جديد</span>
        </div>
        <div class="stat-card-small" onclick="filterStatus('بانتظار')" id="st-pending">
            <span class="num txt-pending" id="c-pending">0</span><span class="lbl">بانتظار الاعتماد</span>
        </div>
        <div class="stat-card-small" onclick="filterStatus('تم')" id="st-approved">
            <span class="num txt-approved" id="c-approved">0</span><span class="lbl">تم الاعتماد</span>
        </div>
        <div class="stat-card-small" onclick="filterStatus('متابعة')" id="st-followup">
            <span class="num txt-followup" id="c-followup">0</span><span class="lbl">بحاجة متابعة</span>
        </div>
    </div>
</div>

<!-- TABS -->
<div class="tabs-bar">
    <button class="tab-btn active" id="tab-tasks" onclick="switchTab('tasks')">
        <i data-lucide="list-checks" style="width:16px;height:16px"></i> مهامي
    </button>
    <button class="tab-btn" id="tab-myfiles" onclick="switchTab('myfiles')">
        <i data-lucide="folder-open" style="width:16px;height:16px"></i> ملفاتي
    </button>
</div>

<!-- TASKS VIEW -->
<div id="view-tasks">
    <div class="cards-container" id="tasks-list">
        <div class="loader-box">
            <i data-lucide="loader-2" style="width:40px;height:40px;display:block;margin:0 auto 12px;color:#0a5c56" class="animate-spin"></i>
            <p style="font-weight:700;color:#94a3b8">جاري تحميل مهامك...</p>
        </div>
    </div>
</div>

<!-- ملفاتي VIEW -->
<div id="view-myfiles" class="hidden">
    <div class="files-container">
        <div id="files-tree-content">
            <div class="empty-files">
                <i data-lucide="loader-2" style="width:32px;height:32px;display:block;margin:0 auto 10px;color:#0a5c56" class="animate-spin"></i>
                <p style="font-weight:700">جاري تحميل ملفاتك من Drive...</p>
            </div>
        </div>
    </div>
</div>

<!-- BOTTOM SHEET MODAL -->
<div class="modal-overlay" id="detail-modal" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
        <div class="sheet-handle"></div>
        <div class="modal-header">
            <div>
                <h3 style="font-weight:800;font-size:1rem;color:#0f172a">تفاصيل المعاملة</h3>
                <p style="font-size:0.72rem;color:#94a3b8;font-family:monospace" id="m-id">#...</p>
            </div>
            <button onclick="closeModal()" class="modal-close-btn">
                <i data-lucide="x" style="width:20px;height:20px"></i>
            </button>
        </div>
        <div class="modal-body" id="m-content"></div>
    </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav" id="bottom-nav"></nav>

<script src="assets/js/config.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/nav.js"></script>
<script src="assets/js/employee.js"></script>
</body>
</html>
