<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a5c56">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">

    <title>لوحة التحكم | IAG System</title>
    <link rel="icon" type="image/png" href="assets/icons/favicon.png">

    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Design System (single entrypoint) -->
    <link rel="stylesheet" href="assets/css/system/iag-design-system.css">
    <!-- Page-specific styles -->
    <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>

    <div class="menu-overlay" id="menu-overlay" onclick="closeMenu()"></div>
    <aside class="side-menu" id="side-menu">
        <div class="side-menu-header">
            <div class="menu-user-row">
                <div class="menu-avatar">
                    <i data-lucide="user"></i>
                </div>
                <div class="menu-user-info">
                    <div id="menu-user">—</div>
                    <div id="menu-role">مدير النظام</div>
                </div>
            </div>
        </div>
        <div class="side-menu-body">
            <nav id="side-nav"></nav>
        </div>
        <div class="menu-footer">
            <button onclick="logout()" class="btn btn-logout">
                <i data-lucide="log-out" class="icon-sm"></i> تسجيل خروج
            </button>
        </div>
    </aside>

    <header class="page-header">
        <div class="header-top">
            <button class="header-btn" onclick="toggleMenu()" aria-label="القائمة">
                <i data-lucide="menu" class="icon-md"></i>
            </button>
            <div class="header-center">
                <div class="header-badge">
                    <i data-lucide="shield-check" class="icon-xs"></i>
                    لوحة التحكم
                </div>
                <h1 class="header-title">
                    <img src="assets/icons/icon-192.png" class="header-logo" alt="شعار">
                    إدارة المراجعة الداخلية والحوكمة
                </h1>
                <p class="header-sub">Internal Audit &amp; Governance</p>
            </div>
            <button class="header-btn" onclick="window.location.href='notifications.html'" aria-label="الإشعارات">
                <i data-lucide="bell" class="icon-md"></i>
                <span id="notif-badge" class="notif-dot hidden"></span>
            </button>
        </div>
    </header>

    <!-- Stats -->
    <div class="admin-stats-wrapper">
        <div class="admin-stats-main">
            <div class="admin-stat-main">
                <div class="stat-icon icon-bg-blue">
                    <i data-lucide="inbox" class="icon-md icon-clr-blue"></i>
                </div>
                <div>
                    <div class="stat-num stat-num-blue" id="s-total">0</div>
                    <div class="stat-lbl">إجمالي المعاملات</div>
                </div>
            </div>
            <div class="admin-stat-main">
                <div class="stat-icon icon-bg-red">
                    <i data-lucide="alert-circle" class="icon-md icon-clr-red"></i>
                </div>
                <div>
                    <div class="stat-num stat-num-red" id="s-late">0</div>
                    <div class="stat-lbl">متأخر — انتباه</div>
                </div>
            </div>
        </div>
        <div class="admin-stats-row">
            <div class="admin-stat-small">
                <div class="stat-num stat-num-blue" id="s-new">0</div>
                <div class="stat-lbl">جديد</div>
            </div>
            <div class="admin-stat-small">
                <div class="stat-num stat-num-orange" id="s-pending">0</div>
                <div class="stat-lbl">بانتظار</div>
            </div>
            <div class="admin-stat-small">
                <div class="stat-num stat-num-green" id="s-done">0</div>
                <div class="stat-lbl">منتهي</div>
            </div>
            <div class="admin-stat-small">
                <div class="stat-num" id="s-followup">0</div>
                <div class="stat-lbl">متابعة</div>
            </div>
        </div>
    </div>

    <!-- Quick Actions -->
    <div class="admin-actions-section">
        <div class="section-title">
            <i data-lucide="zap" class="icon-sm icon-clr-orange"></i>
            إجراءات سريعة
        </div>
        <div class="admin-actions-grid">
            <button onclick="openModal('updateStatus')" class="admin-action-btn btn-primary">
                <i data-lucide="refresh-cw" class="icon-md"></i>
                <span>تحديث حالة</span>
            </button>
            <button onclick="openModal('sendEmail')" class="admin-action-btn">
                <i data-lucide="mail" class="icon-md"></i>
                <span>بريد إلكتروني</span>
            </button>
            <button onclick="openModal('sendNotification')" class="admin-action-btn">
                <i data-lucide="bell" class="icon-md"></i>
                <span>إشعار فوري</span>
            </button>
            <button onclick="exportData()" class="admin-action-btn">
                <i data-lucide="download" class="icon-md"></i>
                <span>تصدير CSV</span>
            </button>
        </div>
    </div>

    <!-- Tasks Table -->
    <div class="admin-table-section">
        <div class="table-wrapper">
            <table class="data-table" id="tasks-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>الموضوع</th>
                        <th>الجهة</th>
                        <th>الموظف</th>
                        <th>الحالة</th>
                        <th>التاريخ</th>
                        <th class="text-center">تحكم</th>
                    </tr>
                </thead>
                <tbody id="tasks-tbody">
                    <tr>
                        <td colspan="7" class="loader-box">
                            <i data-lucide="loader-2" class="icon-lg spin"></i>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal: Update Status -->
    <div class="modal-overlay" id="modal-updateStatus" onclick="if(event.target===this)closeModal('modal-updateStatus')">
        <div class="modal-box">
            <div class="modal-header">
                <h3 class="modal-title">تحديث حالة معاملة</h3>
                <button onclick="closeModal('modal-updateStatus')" class="modal-close-btn" aria-label="إغلاق">
                    <i data-lucide="x" class="icon-md"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="f-group">
                    <label class="f-label">رقم المعاملة (Task ID)</label>
                    <input type="text" id="upd-task-id" class="f-input" placeholder="مثال: 105">
                </div>
                <div class="f-group">
                    <label class="f-label">الحالة الجديدة</label>
                    <select id="upd-status" class="f-input">
                        <option value="جديد">جديد</option>
                        <option value="بانتظار الاعتماد">بانتظار الاعتماد</option>
                        <option value="تم الاعتماد والأرشفة">تم الاعتماد والأرشفة</option>
                        <option value="بحاجة الي متابعة">بحاجة الي متابعة</option>
                        <option value="متأخر">متأخر</option>
                    </select>
                </div>
                <div class="f-group">
                    <label class="f-label">ملاحظات إدارية</label>
                    <textarea id="upd-notes" class="f-input f-textarea" rows="3"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button onclick="confirmUpdate()" class="btn btn-modal-primary" id="btn-confirm-update">حفظ التحديث</button>
                <button onclick="closeModal('modal-updateStatus')" class="btn btn-modal-cancel">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- Modal: Send Email -->
    <div class="modal-overlay" id="modal-sendEmail" onclick="if(event.target===this)closeModal('modal-sendEmail')">
        <div class="modal-box">
            <div class="modal-header">
                <h3 class="modal-title">إرسال بريد إلكتروني</h3>
                <button onclick="closeModal('modal-sendEmail')" class="modal-close-btn" aria-label="إغلاق">
                    <i data-lucide="x" class="icon-md"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="f-group">
                    <label class="f-label">الموظف</label>
                    <select id="email-to" class="f-input"><option value="">جاري التحميل...</option></select>
                </div>
                <div class="f-group">
                    <label class="f-label">الموضوع</label>
                    <input type="text" id="email-subject" class="f-input">
                </div>
                <div class="f-group">
                    <label class="f-label">الرسالة</label>
                    <textarea id="email-body" class="f-input f-textarea" rows="4"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button onclick="sendEmail()" class="btn btn-modal-primary" id="btn-send-email">إرسال</button>
                <button onclick="closeModal('modal-sendEmail')" class="btn btn-modal-cancel">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- Modal: Send Notification -->
    <div class="modal-overlay" id="modal-sendNotification" onclick="if(event.target===this)closeModal('modal-sendNotification')">
        <div class="modal-box">
            <div class="modal-header">
                <h3 class="modal-title">إرسال إشعار فوري</h3>
                <button onclick="closeModal('modal-sendNotification')" class="modal-close-btn" aria-label="إغلاق">
                    <i data-lucide="x" class="icon-md"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="f-group">
                    <label class="f-label">المستلم</label>
                    <select id="notif-to" class="f-input">
                        <option value="all">الجميع</option>
                    </select>
                </div>
                <div class="f-group">
                    <label class="f-label">نص الإشعار</label>
                    <textarea id="notif-msg" class="f-input f-textarea" rows="3"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button onclick="sendNotification()" class="btn btn-modal-primary" id="btn-broadcast">بث الإشعار</button>
                <button onclick="closeModal('modal-sendNotification')" class="btn btn-modal-cancel">إلغاء</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav" id="bottom-nav"></nav>

    <!-- Core layer (must load before page script) -->
    <script src="assets/js/config.js"></script>
    <script src="assets/js/core/api.js"></script>
    <script src="assets/js/core/session.js"></script>
    <script src="assets/js/core/ui-feedback.js"></script>
    <script src="assets/js/nav.js"></script>
    <!-- Page script -->
    <script src="assets/js/admin.js" defer></script>
</body>
</html>
