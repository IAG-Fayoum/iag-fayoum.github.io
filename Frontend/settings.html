<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a5c56">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">

    <title>إجراءات | IAG System</title>
    <link rel="icon" type="image/png" href="assets/icons/favicon.png">

    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/theme.css">
    <link rel="stylesheet" href="assets/css/iag-theme.css">
    <link rel="stylesheet" href="assets/css/settings.css">
</head>
<body>

    <div class="menu-overlay" id="menu-overlay" onclick="closeMenu()"></div>
    <aside class="side-menu" id="side-menu">
        <div class="side-menu-header">
            <div style="display:flex;align-items:center;gap:12px">
                <div style="width:40px;height:40px;background:rgba(255,255,255,0.15);border-radius:50%;display:flex;align-items:center;justify-content:center"><i data-lucide="user" style="width:20px;height:20px;color:white"></i></div>
                <div>
                    <div style="font-weight:900;font-size:0.9rem;color:white" id="menu-user">—</div>
                    <div style="font-size:0.72rem;color:#99f6e4;font-weight:800" id="menu-role"></div>
                </div>
            </div>
        </div>
        <div class="side-menu-body">
            <nav id="side-nav"></nav>
        </div>
        <div class="menu-footer">
            <button onclick="logout()" class="btn btn-ghost" style="width:100%;color:var(--danger);gap:8px;justify-content:center">
                <i data-lucide="log-out" style="width:16px;height:16px"></i> تسجيل خروج
            </button>
        </div>
    </aside>

    <header class="page-header">
        <div class="header-top">
            <button class="header-btn" onclick="toggleMenu()">
                <i data-lucide="menu" style="width:20px;height:20px"></i>
            </button>
            <div class="header-center">
                <div class="header-badge">
                    <i data-lucide="clipboard-list" style="width:12px;height:12px"></i>
                    الإجراءات
                </div>
                <h1 class="header-title"><img src="assets/icons/icon-192.png" class="header-logo" alt="شعار">إدارة المراجعة الداخلية والحوكمة</h1>
                <p class="header-sub">Internal Audit &amp; Governance</p>
            </div>
            <button class="header-btn" onclick="window.location.href='notifications.html'">
                <i data-lucide="bell" style="width:20px;height:20px"></i>
                <span class="notif-dot"></span>
            </button>
        </div>
    </header>

    <div class="settings-container">

        <div class="setting-card">
            <div class="card-title">
                <i data-lucide="user-plus" class="icon-teal" style="width:18px;height:18px"></i>
                <span>إعادة تكليف مهمة</span>
            </div>
            <div class="form-group">
                <div>
                    <label class="f-label">رقم المهمة (Task ID)</label>
                    <input type="text" id="reassign-id" class="f-input" placeholder="مثال: 152">
                </div>
                <div>
                    <label class="f-label">الموظف الجديد</label>
                    <input type="text" id="reassign-name" class="f-input" placeholder="اسم الموظف">
                </div>
                <button onclick="handleReassign()" id="btn-reassign" class="btn-action">
                    <i data-lucide="check-circle" style="width:16px;height:16px"></i> تنفيذ النقل
                </button>
            </div>
        </div>

        <div class="setting-card">
            <div class="card-title">
                <i data-lucide="refresh-cw" class="icon-blue" style="width:18px;height:18px"></i>
                <span>تحديث حالة يدوياً</span>
            </div>
            <div class="form-group">
                <div>
                    <label class="f-label">رقم المهمة</label>
                    <input type="text" id="status-id" class="f-input" placeholder="مثال: 152">
                </div>
                <div>
                    <label class="f-label">الحالة الجديدة</label>
                    <select id="status-val" class="f-input">
                        <option value="جديد">جديد</option>
                        <option value="بانتظار الاعتماد">بانتظار الاعتماد</option>
                        <option value="تم الاعتماد والأرشفة">تم الاعتماد والأرشفة</option>
                        <option value="بحاجة الي متابعة">بحاجة الي متابعة</option>
                    </select>
                </div>
                <button onclick="handleStatus()" id="btn-status" class="btn-action btn-action-blue">
                    <i data-lucide="save" style="width:16px;height:16px"></i> حفظ التعديل
                </button>
            </div>
        </div>

    </div>

    <nav class="bottom-nav" id="bottom-nav"></nav>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/nav.js"></script>
    <script src="assets/js/settings.js" defer></script>
</body>
</html>
