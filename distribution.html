<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a5c56">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">

    <title>مؤشرات الأداء | IAG System</title>
    <link rel="icon" type="image/png" href="assets/icons/favicon.png">

    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/system/iag-design-system.css">
    <link rel="stylesheet" href="assets/css/distribution.css">
</head>
<body>

    <div class="menu-overlay" id="menu-overlay" onclick="closeMenu()"></div>
    <aside class="side-menu" id="side-menu">
        <div class="side-menu-header">
            <div style="display:flex;align-items:center;gap:12px">
                <div style="width:40px;height:40px;background:rgba(255,255,255,0.15);border-radius:50%;display:flex;align-items:center;justify-content:center">
                    <i data-lucide="user" style="width:20px;height:20px;color:white"></i>
                </div>
                <div>
                    <div style="font-weight:900;font-size:0.9rem;color:white" id="menu-user">—</div>
                    <div style="font-size:0.72rem;color:#99f6e4;font-weight:800" id="menu-role"></div>
                </div>
            </div>
        </div>
        <div class="side-menu-body">
            <nav id="side-nav"></nav>
        </div>
        <div class="menu-footer">
            <button onclick="logout()" class="btn btn-ghost" style="width:100%;color:var(--danger);gap:8px;justify-content:center">
                <i data-lucide="log-out" style="width:16px;height:16px"></i> تسجيل خروج
            </button>
        </div>
    </aside>

    <header class="page-header">
        <div class="header-top">
            <button class="header-btn" onclick="toggleMenu()">
                <i data-lucide="menu" style="width:20px;height:20px"></i>
            </button>
            <div class="header-center">
                <div class="header-badge">
                    <i data-lucide="bar-chart-2" style="width:12px;height:12px"></i>
                    مؤشرات الأداء
                </div>
                <h1 class="header-title">
                    <img src="assets/icons/icon-192.png" class="header-logo" alt="شعار الإدارة">
                    إدارة المراجعة الداخلية والحوكمة
                </h1>
                <p class="header-sub">Internal Audit &amp; Governance</p>
            </div>
            <button class="header-btn" onclick="window.location.href='notifications.html'">
                <i data-lucide="bell" style="width:20px;height:20px"></i>
                <span class="notif-dot"></span>
            </button>
        </div>
    </header>

    <div class="filter-container">
        <div class="filters-row">
            <div>
                <label class="f-label">السنة</label>
                <select id="f-year" class="f-input" onchange="loadData()">
                    <option value="2024">2024</option>
                    <option value="2025">2025</option>
                    <option value="2026" selected>2026</option>
                    <option value="2027">2027</option>
                    <option value="2028">2028</option>
                    <option value="2029">2029</option>
                    <option value="2030">2030</option>
                </select>
            </div>
            <div>
                <label class="f-label">الفترة</label>
                <select id="f-period" class="f-input" onchange="loadData()">
                    <option value="">الكل</option>
                    <optgroup label="ربع سنوي">
                        <option value="Q1">الربع الأول</option>
                        <option value="Q2">الربع الثاني</option>
                        <option value="Q3">الربع الثالث</option>
                        <option value="Q4">الربع الرابع</option>
                    </optgroup>
                    <optgroup label="شهري">
                        <option value="1">يناير</option>
                        <option value="2">فبراير</option>
                        <option value="3">مارس</option>
                        <option value="4">أبريل</option>
                        <option value="5">مايو</option>
                        <option value="6">يونيو</option>
                        <option value="7">يوليو</option>
                        <option value="8">أغسطس</option>
                        <option value="9">سبتمبر</option>
                        <option value="10">أكتوبر</option>
                        <option value="11">نوفمبر</option>
                        <option value="12">ديسمبر</option>
                    </optgroup>
                </select>
            </div>
            <div>
                <label class="f-label">المجموعة</label>
                <select id="f-group" class="f-input" onchange="switchTab()">
                    <option value="">الكل</option>
                    <option value="admin">مالي وإداري</option>
                    <option value="tech">فني وطبي</option>
                </select>
            </div>
        </div>
    </div>

    <div class="tabs-wrapper">
        <div class="tabs-container">
            <div onclick="setTab('employees')" id="tab-emp" class="tab-btn active">أداء الموظفين</div>
            <div onclick="setTab('sources')"   id="tab-src" class="tab-btn">تحليل الجهات</div>
        </div>

        <div id="view-employees">
            <div class="stats-grid" id="stats-emp"></div>
            <div class="bulk-actions">
                <button onclick="printAllEmps()" class="btn-bulk-print">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                    طباعة PDF
                </button>
                <button onclick="remindAllEmps()" class="btn-bulk-remind">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                    إرسال إيميل
                </button>
            </div>
            <div class="cards-list" id="list-emp">
                <div class="loader-box">جاري التحميل...</div>
            </div>
        </div>

        <div id="view-sources" class="hidden">
            <div class="stats-grid" id="stats-src"></div>
            <div class="src-filter-label-wrap">
                <span id="src-filter-label">اضغط على جهة لعرض توزيعها على الموظفين</span>
            </div>
            <div class="cards-list" id="list-src"></div>
        </div>
    </div>

    <div class="modal-overlay" id="detail-modal">
        <div class="modal-box">
            <div class="modal-header">
                <div>
                    <h3 class="m-title" id="m-title">...</h3>
                    <p class="m-subtitle" id="m-subtitle">...</p>
                </div>
                <button onclick="closeModal()" class="modal-close-btn">
                    <i data-lucide="x" style="width:20px;height:20px"></i>
                </button>
            </div>
            <div class="modal-body" id="m-content"></div>
        </div>
    </div>

    <nav class="bottom-nav hidden" id="bottom-nav"></nav>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/core/api.js"></script>
    <script src="assets/js/core/session.js"></script>
    <script src="assets/js/core/ui-feedback.js"></script>
    <script src="assets/js/nav.js"></script>
    <script src="assets/js/distribution.js"></script>
</body>
</html>
