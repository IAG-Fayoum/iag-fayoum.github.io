<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f766e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">

    <title>لوحة التحكم | IAG System</title>
    <link rel="icon" type="image/png" href="assets/icons/favicon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <link rel="stylesheet" href="assets/css/theme.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css">

    <style>
        /* STATS */
        .stats-wrapper { margin: -3.5rem 1rem 1rem; position: relative; z-index: 20; display: flex; flex-direction: column; gap: 10px; max-width: 1300px; margin-left: auto; margin-right: auto; padding: 0 0; }
        .stats-row-main { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }

        .stat-card-main { background: white; border-radius: var(--radius-lg); padding: 1.25rem; box-shadow: var(--shadow-sm); border: 1px solid var(--border); display: flex; align-items: center; gap: 1rem; }
        .stat-icon { width: 48px; height: 48px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .stat-card { background: white; border-radius: var(--radius-md); padding: 10px; text-align: center; border: 1px solid var(--border); display: flex; flex-direction: column; justify-content: center; min-height: 80px; box-shadow: var(--shadow-sm); }
        .stat-num { font-size: 1.5rem; font-weight: 800; line-height: 1; }
        .stat-lbl { font-size: 0.68rem; font-weight: 700; color: var(--text-3); margin-top: 3px; }

        /* ACTIONS */
        .actions-section { max-width: 1300px; margin: 0 auto 1.5rem; padding: 0 1rem; }
        .section-header { font-weight: 800; color: var(--text-1); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }
        .actions-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        @media (min-width: 768px) { .actions-grid { grid-template-columns: repeat(4, 1fr); } }

        .action-btn { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; font-weight: 700; color: var(--text-2); font-size: 0.85rem; cursor: pointer; transition: 0.2s; height: 96px; font-family: 'Cairo', sans-serif; }
        .action-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .action-btn.primary { background: var(--primary); color: white; border: none; box-shadow: 0 4px 12px rgba(15,118,110,0.25); }
        .action-btn.primary:hover { background: var(--primary-dark); color: white; }

        /* TABLE */
        .table-section { max-width: 1300px; margin: 0 auto; padding: 0 1rem 2rem; }
        .table-container { background: white; border-radius: var(--radius-lg); padding: 1rem; border: 1px solid var(--border); box-shadow: var(--shadow-sm); overflow: hidden; }

        table.dataTable { width: 100% !important; border-collapse: collapse !important; }
        table.dataTable thead th { background: var(--surface-2); color: var(--text-2); font-weight: 800; padding: 12px; border-bottom: 2px solid var(--border); text-align: right; }
        table.dataTable tbody td { padding: 12px; border-bottom: 1px solid var(--surface-2); color: var(--text-1); vertical-align: middle; }
        .status-badge { padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; display: inline-block; white-space: nowrap; }
        .st-new     { background: #eff6ff; color: #2563eb; }
        .st-pending { background: #fff7ed; color: #c2410c; }
        .st-done    { background: #ecfdf5; color: #059669; }
        .st-late    { background: #fef2f2; color: #dc2626; }

        /* FORM GROUPS */
        .f-group { margin-bottom: 1rem; }
        .f-btn { width: 100%; padding: 12px; background: var(--primary); color: white; border-radius: var(--radius-sm); font-weight: 700; font-family: 'Cairo', sans-serif; border: none; cursor: pointer; transition: 0.2s; }
        .f-btn:hover { background: var(--primary-dark); }
    </style>
</head>
<body>

    <div class="menu-overlay" id="menu-overlay" onclick="closeMenu()"></div>
    <aside class="side-menu" id="side-menu">
        <div class="side-menu-header">
            <div style="display:flex;align-items:center;gap:12px">
                <div style="width:44px;height:44px;background:rgba(255,255,255,0.12);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0">
                    <i data-lucide="shield-check" style="width:22px;height:22px;color:white"></i>
                </div>
                <div>
                    <div style="font-weight:800;font-size:0.9rem;color:white" id="menu-user">Admin</div>
                    <div style="font-size:0.72rem;color:#99f6e4">مدير النظام</div>
                </div>
            </div>
        </div>
        <div class="side-menu-body">
            <nav id="side-nav"></nav>
        </div>
        <div class="menu-footer">
            <button onclick="logout()" class="btn btn-ghost" style="width:100%;color:var(--danger);justify-content:center">
                <i data-lucide="log-out" style="width:16px;height:16px"></i> تسجيل خروج
            </button>
        </div>
    </aside>

    <header class="page-header">
        <div class="header-top">
            <button class="header-btn" onclick="toggleMenu()">
                <i data-lucide="menu" style="width:20px;height:20px"></i>
            </button>
            <div class="header-center">
                <div class="header-badge">
                    <i data-lucide="shield-check" style="width:12px;height:12px"></i>
                    لوحة التحكم
                </div>
                <h1 class="header-title">إدارة المراجعة الداخلية</h1>
                <p class="header-sub">Central Admin Dashboard</p>
                <p class="header-user" id="header-name"></p>
            </div>
            <button class="header-btn" onclick="window.location.href='notifications.html'">
                <i data-lucide="bell" style="width:20px;height:20px"></i>
                <span id="notif-badge" class="notif-dot hidden"></span>
            </button>
        </div>
    </header>

    <div class="stats-wrapper">
        <div class="stats-row-main">
            <div class="stat-card-main">
                <div class="stat-icon bg-blue-100"><i data-lucide="inbox" class="text-blue-600"></i></div>
                <div><div class="stat-num text-slate-800" id="s-total">0</div><div class="stat-lbl">إجمالي المعاملات</div></div>
            </div>
            <div class="stat-card-main">
                <div class="stat-icon bg-red-100"><i data-lucide="alert-circle" class="text-red-600"></i></div>
                <div><div class="stat-num text-red-600" id="s-late">0</div><div class="stat-lbl">متأخر - انتباه</div></div>
            </div>
        </div>
        <div class="stats-row">
            <div class="stat-card"><div class="stat-num text-blue-600" id="s-new">0</div><div class="stat-lbl">جديد</div></div>
            <div class="stat-card"><div class="stat-num text-orange-600" id="s-pending">0</div><div class="stat-lbl">بانتظار</div></div>
            <div class="stat-card"><div class="stat-num text-emerald-600" id="s-done">0</div><div class="stat-lbl">منتهي</div></div>
            <div class="stat-card"><div class="stat-num text-gray-600" id="s-followup">0</div><div class="stat-lbl">متابعة</div></div>
        </div>
    </div>

    <div class="actions-section">
        <div class="section-header"><i data-lucide="zap" style="width:18px;height:18px;color:#f59e0b"></i> إجراءات سريعة</div>
        <div class="actions-grid">
            <button onclick="openModal('updateStatus')" class="action-btn primary"><i data-lucide="refresh-cw"></i><span>تحديث حالة</span></button>
            <button onclick="openModal('sendEmail')" class="action-btn"><i data-lucide="mail"></i><span>بريد إلكتروني</span></button>
            <button onclick="openModal('sendNotification')" class="action-btn"><i data-lucide="bell"></i><span>إشعار فوري</span></button>
            <button onclick="exportData()" class="action-btn"><i data-lucide="download"></i><span>تصدير Excel</span></button>
        </div>
    </div>

    <div class="table-section">
        <div class="table-container">
            <table id="tasks-table" class="display responsive nowrap" style="width:100%">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>الموضوع</th>
                        <th>الجهة</th>
                        <th>الموظف</th>
                        <th>الحالة</th>
                        <th>التاريخ</th>
                        <th>تحكم</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="modal-updateStatus">
        <div class="modal-box">
            <div class="modal-header">
                <h3 style="font-weight:800;font-size:0.95rem">تحديث حالة معاملة</h3>
                <button onclick="closeModal('modal-updateStatus')" class="header-btn" style="width:32px;height:32px"><i data-lucide="x" style="width:16px;height:16px"></i></button>
            </div>
            <div class="modal-body">
                <div class="f-group">
                    <label class="f-label">رقم المعاملة (Task ID)</label>
                    <input type="text" id="upd-task-id" class="f-input" placeholder="مثال: 105">
                </div>
                <div class="f-group">
                    <label class="f-label">الحالة الجديدة</label>
                    <select id="upd-status" class="f-input">
                        <option value="جديد">جديد</option>
                        <option value="بانتظار الاعتماد">بانتظار الاعتماد</option>
                        <option value="تم الاعتماد والأرشفة">تم الاعتماد والأرشفة</option>
                        <option value="بحاجة الي متابعة">بحاجة الي متابعة</option>
                        <option value="متأخر">متأخر</option>
                    </select>
                </div>
                <div class="f-group">
                    <label class="f-label">ملاحظات إدارية</label>
                    <textarea id="upd-notes" class="f-input" rows="3" style="height:auto;padding:10px"></textarea>
                </div>
                <button onclick="confirmUpdate()" class="f-btn">حفظ التحديث</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-sendEmail">
        <div class="modal-box">
            <div class="modal-header">
                <h3 style="font-weight:800;font-size:0.95rem">إرسال بريد إلكتروني</h3>
                <button onclick="closeModal('modal-sendEmail')" class="header-btn" style="width:32px;height:32px"><i data-lucide="x" style="width:16px;height:16px"></i></button>
            </div>
            <div class="modal-body">
                <div class="f-group">
                    <label class="f-label">الموظف</label>
                    <select id="email-to" class="f-input"><option value="">جاري التحميل...</option></select>
                </div>
                <div class="f-group">
                    <label class="f-label">الموضوع</label>
                    <input type="text" id="email-subject" class="f-input">
                </div>
                <div class="f-group">
                    <label class="f-label">الرسالة</label>
                    <textarea id="email-body" class="f-input" rows="4" style="height:auto;padding:10px"></textarea>
                </div>
                <button onclick="sendEmail()" class="f-btn" style="background:#2563eb">إرسال</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-sendNotification">
        <div class="modal-box">
            <div class="modal-header">
                <h3 style="font-weight:800;font-size:0.95rem">إرسال إشعار فوري</h3>
                <button onclick="closeModal('modal-sendNotification')" class="header-btn" style="width:32px;height:32px"><i data-lucide="x" style="width:16px;height:16px"></i></button>
            </div>
            <div class="modal-body">
                <div class="f-group">
                    <label class="f-label">المستلم</label>
                    <select id="notif-to" class="f-input"><option value="all">الجميع</option></select>
                </div>
                <div class="f-group">
                    <label class="f-label">نص الإشعار</label>
                    <textarea id="notif-msg" class="f-input" rows="3" style="height:auto;padding:10px"></textarea>
                </div>
                <button onclick="sendNotification()" class="f-btn" style="background:#d97706">بث الإشعار</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav" id="bottom-nav"></nav>

    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.2/js/dataTables.buttons.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.html5.min.js"></script>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/nav.js"></script>

    <script>
        lucide.createIcons();
        let dataTable;
        let allEmployees = [];

        document.addEventListener('DOMContentLoaded', async () => {
            const userStr = localStorage.getItem('iag_user');
            if (!userStr) { window.location.href = 'index.html'; return; }

            const user = JSON.parse(userStr);
            if (user.role !== 'مدير' && user.role !== 'Admin') {
                alert('غير مصرح لك بالدخول لهذه الصفحة');
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('header-name').textContent = user.name;

            initDataTable();
            await loadData(user.name);
        });

        function toggleMenu() {
            document.getElementById('side-menu').classList.toggle('open');
            document.getElementById('menu-overlay').classList.toggle('open');
        }
        function closeMenu() {
            document.getElementById('side-menu').classList.remove('open');
            document.getElementById('menu-overlay').classList.remove('open');
        }
        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
        function closeModal(id) { document.getElementById(id).classList.remove('open'); }
        function openModal(id) { document.getElementById('modal-'+id).classList.add('open'); }

        function initDataTable() {
            dataTable = $('#tasks-table').DataTable({
                responsive: true,
                language: { url: '//cdn.datatables.net/plug-ins/1.13.7/i18n/ar.json' },
                dom: 'Brtip',
                buttons: [ { extend: 'excel', className: 'hidden' } ],
                pageLength: 10,
                order: [[0, 'desc']],
                columnDefs: [
                    { responsivePriority: 1, targets: 0 },
                    { responsivePriority: 2, targets: 1 },
                    { responsivePriority: 3, targets: 4 }
                ]
            });
        }

        async function loadData(username) {
            try {
                const res = await fetch(CONFIG.API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getAllData', role: 'مدير', name: username })
                });
                const data = await res.json();

                if (data.success) {
                    const tasks = data.tasks || [];
                    allEmployees = data.stats.employees || [];
                    updateStats(data.stats.totals);
                    populateTable(tasks);
                    populateDropdowns();
                } else {
                    alert('لم يتم تحميل البيانات بشكل صحيح');
                }
            } catch (e) {
                console.error(e);
                alert('خطأ في الاتصال بالخادم');
            }
        }

        function updateStats(s) {
            if(!s) return;
            $('#s-total').text(s.total); $('#s-late').text(s.overdue);
            $('#s-new').text(s.new); $('#s-pending').text(s.pending);
            $('#s-done').text(s.completed); $('#s-followup').text(s.followup);
        }

        function populateTable(tasks) {
            dataTable.clear();
            tasks.forEach(t => {
                let badge = 'st-new';
                if(t.status.includes('تم')) badge = 'st-done';
                else if(t.status.includes('بانتظار')) badge = 'st-pending';
                else if(t.status.includes('متأخر')) badge = 'st-late';

                dataTable.row.add([
                    `<span class="font-mono font-bold text-gray-600">#${t.id}</span>`,
                    `<span class="font-bold text-gray-800">${t.subject}</span>`,
                    t.source || '-',
                    `<span class="text-teal-700 font-bold">${t.assignee || '-'}</span>`,
                    `<span class="status-badge ${badge}">${t.status}</span>`,
                    t.date,
                    `<button class="text-blue-600 hover:bg-blue-50 p-2 rounded-full" onclick="openEdit('${t.id}')"><i data-lucide="edit-3" class="w-4 h-4"></i></button>`
                ]);
            });
            dataTable.draw();
            lucide.createIcons();
        }

        function populateDropdowns() {
            const empSelects = [document.getElementById('email-to'), document.getElementById('notif-to')];
            empSelects.forEach(s => { if(s) s.innerHTML = '<option value="">اختر الموظف...</option>'; });
            if(document.getElementById('notif-to')) {
                const allOpt = document.createElement('option'); allOpt.value = 'all'; allOpt.textContent = 'الجميع';
                document.getElementById('notif-to').appendChild(allOpt);
            }
            allEmployees.forEach(e => {
                empSelects.forEach(s => {
                    if(s) { const opt = document.createElement('option'); opt.value = e.name; opt.textContent = e.name; s.appendChild(opt); }
                });
            });
        }

        function openEdit(id) { $('#upd-task-id').val(id); openModal('updateStatus'); }

        async function confirmUpdate() {
            const taskId = $('#upd-task-id').val();
            const status = $('#upd-status').val();
            const notes = $('#upd-notes').val();
            const btn = document.querySelector('#modal-updateStatus .f-btn');
            if(!taskId) { alert('رقم المعاملة مطلوب'); return; }
            const user = JSON.parse(localStorage.getItem('iag_user'));
            btn.textContent = 'جاري الحفظ...'; btn.disabled = true;
            try {
                const res = await fetch(CONFIG.API_URL, { method: 'POST', body: JSON.stringify({ action: 'adminUpdateStatus', taskId, newStatus: status, notes, updatedBy: user.name }) });
                const data = await res.json();
                if(data.success) { alert('✅ تم تحديث الحالة بنجاح'); closeModal('modal-updateStatus'); loadData(user.name); }
                else { alert('❌ خطأ: ' + data.error); }
            } catch(e) { alert('❌ خطأ في الاتصال'); }
            finally { btn.textContent = 'حفظ التحديث'; btn.disabled = false; }
        }

        async function sendEmail() {
            const to = $('#email-to').val(), subject = $('#email-subject').val(), body = $('#email-body').val();
            const btn = document.querySelector('#modal-sendEmail .f-btn');
            if(!to || !subject) { alert('البيانات ناقصة'); return; }
            btn.textContent = 'جاري الإرسال...'; btn.disabled = true;
            try {
                const res = await fetch(CONFIG.API_URL, { method: 'POST', body: JSON.stringify({ action: 'sendCustomEmail', toEmployee: to, subject, body }) });
                const data = await res.json();
                if(data.success) { alert('✅ تم الإرسال'); closeModal('modal-sendEmail'); }
                else { alert('❌ فشل الإرسال'); }
            } catch(e) { alert('❌ خطأ في الاتصال'); }
            finally { btn.textContent = 'إرسال'; btn.disabled = false; }
        }

        async function sendNotification() {
            const to = $('#notif-to').val(), msg = $('#notif-msg').val();
            const btn = document.querySelector('#modal-sendNotification .f-btn');
            if(!msg) { alert('اكتب الرسالة'); return; }
            btn.textContent = 'جاري البث...'; btn.disabled = true;
            try {
                const res = await fetch(CONFIG.API_URL, { method: 'POST', body: JSON.stringify({ action: 'broadcastNotification', target: to, message: msg }) });
                const data = await res.json();
                if(data.success) { alert('✅ تم بث الإشعار'); closeModal('modal-sendNotification'); }
                else { alert('❌ فشل البث'); }
            } catch(e) { alert('❌ خطأ في الاتصال'); }
            finally { btn.textContent = 'بث الإشعار'; btn.disabled = false; }
        }

        function exportData() { dataTable.button(0).trigger(); }
    </script>
</body>
</html>
